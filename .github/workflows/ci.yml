name: CI

# Gate PRs and re-check on merge to main. The deploy workflow (hugo.yml) runs
# the fast typecheck + unit gate before publishing; the browser e2e lives here.
on:
  pull_request:
  push:
    branches: [main]

# Least privilege: this workflow only reads the tree and runs tests. Set
# explicitly so the job stays safe if the repo-level default is ever widened.
permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      HUGO_VERSION: 0.163.3
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '22'
      - name: Install deps
        run: npm ci
      - name: Typecheck
        run: npm run typecheck
      - name: Unit tests
        run: npm test
      - name: Install Hugo
        run: |
          wget -O "${RUNNER_TEMP}/hugo.deb" \
            "https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_extended_${HUGO_VERSION}_linux-amd64.deb"
          sudo dpkg -i "${RUNNER_TEMP}/hugo.deb"
      - name: Build site
        run: hugo --minify
      - name: End-to-end (headless Chrome over CDP)
        run: |
          # Serve the built site statically (production-like: /foo/index.html
          # is served directly, so the index.html-alias route is exercised).
          python3 -m http.server 8080 --directory public &
          for i in $(seq 1 30); do curl -sf http://127.0.0.1:8080/ >/dev/null && break; sleep 1; done
          BASE_URL=http://127.0.0.1:8080 node tests/e2e/console.e2e.mjs
          MOBILE=1 BASE_URL=http://127.0.0.1:8080 node tests/e2e/console.e2e.mjs
