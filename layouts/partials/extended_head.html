{{- /* GitHub Pages can't set response headers, so this meta CSP is the
      enforceable subset. frame-ancestors, HSTS, and COOP need real headers
      (i.e., a fronting CDN); they are deliberately absent here. */}}
<meta http-equiv="Content-Security-Policy" content="default-src 'none'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' https://raw.githubusercontent.com/matt-w-horn/; connect-src 'self'; base-uri 'none'; form-action 'none'; require-trusted-types-for 'script'">
